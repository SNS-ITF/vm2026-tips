let state = {participants:[], tips:{}, results:{}, live:{}, filter:'all'};

const sbHeaders = {
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'apikey': SUPABASE_KEY,
  'Content-Type': 'application/json',
  'Accept': 'application/json'
};

async function loadState() {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/tipskonkurrence?id=eq.shared&select=*`, {headers: sbHeaders});
  const d = await r.json();
  if (d[0]?.data) state = Object.assign(state, JSON.parse(d[0].data));
}

async function saveState() {
  await fetch(`${SUPABASE_URL}/rest/v1/tipskonkurrence`, {
    method: 'POST',
    headers: {...sbHeaders, 'Prefer': 'resolution=merge-duplicates'},
    body: JSON.stringify({id:'shared', data: JSON.stringify(state), updated_at: new Date().toISOString()})
  });
}

function calcTip(s1, s2) {
  if (s1 > s2) return '1';
  if (s1 === s2) return 'X';
  return '2';
}

function renderTable() {
  const tbody = document.getElementById('match-rows');
  let html = '';
  let lastSection = '';

  MATCHES.forEach(([num, t1, t2, section]) => {
    if (section !== lastSection) {
      lastSection = section;
      html += `<tr><td colspan="6" class="section">${section}</td></tr>`;
    }
    const res = state.results[String(num)] || '';
    const live = state.live[num] || {};
    const score = live.score || '';
    const parts = score ? score.split('–') : ['', ''];
    const s1 = parts[0] || '';
    const s2 = parts[1] || '';
    const tipVal = res ? `<span class="tip-badge tip-${res.toLowerCase()}">${res}</span>` : '–';

    html += `<tr>
      <td style="font-weight:700;color:#1a2d3d">${num}</td>
      <td>${t1}</td>
      <td style="text-align:center">
        <input class="score-inp" id="s1-${num}" value="${s1}" placeholder="–" type="number" min="0" max="20">
        <span class="sep">–</span>
        <input class="score-inp" id="s2-${num}" value="${s2}" placeholder="–" type="number" min="0" max="20">
      </td>
      <td>${t2}</td>
      <td style="text-align:center">${tipVal}</td>
      <td><button class="save-btn" onclick="saveMatch(${num})">Gem</button></td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

async function saveMatch(num) {
  const s1inp = document.getElementById(`s1-${num}`).value;
  const s2inp = document.getElementById(`s2-${num}`).value;
  const btn = document.querySelector(`button[onclick="saveMatch(${num})"]`);

  if (s1inp === '' || s2inp === '') {
    // Slet resultat
    delete state.results[String(num)];
    delete state.live[num];
  } else {
    const s1 = parseInt(s1inp);
    const s2 = parseInt(s2inp);
    const t = calcTip(s1, s2);
    state.results[String(num)] = t;
    state.live[num] = {score: `${s1}–${s2}`};
  }

  try {
    btn.textContent = '...';
    btn.disabled = true;
    await saveState();
    btn.textContent = '✓';
    btn.className = 'save-btn saved';
    showStatus('ok', `Kamp ${num} gemt i Supabase`);
    setTimeout(() => { btn.textContent = 'Gem'; btn.className = 'save-btn'; btn.disabled = false; }, 2000);
    renderTable();
  } catch(e) {
    showStatus('err', 'Fejl: ' + e.message);
    btn.textContent = 'Gem';
    btn.disabled = false;
  }
}

async function saveAllVisible() {
  // Gem alle kampe der har scores udfyldt
  let count = 0;
  for (const [num] of MATCHES) {
    const s1inp = document.getElementById(`s1-${num}`)?.value;
    const s2inp = document.getElementById(`s2-${num}`)?.value;
    if (s1inp !== '' && s2inp !== '') {
      const s1 = parseInt(s1inp), s2 = parseInt(s2inp);
      state.results[String(num)] = calcTip(s1, s2);
      state.live[num] = {score: `${s1}–${s2}`};
      count++;
    }
  }
  await saveState();
  showStatus('ok', `${count} resultater gemt`);
  renderTable();
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
  setTimeout(() => el.style.display = 'none', 4000);
}
