name: Opdater kampresultater
 
on:
  schedule:
    - cron: '*/30 * * * *'   # Hver 30. minut
  workflow_dispatch:           # Manuel kørsel
 
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
 
      - name: Hent resultater
        run: python update.py > data.json
 
      - name: Commit hvis ændret
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Auto: opdater kampresultater"
          git push
 
