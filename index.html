<title>VM 2026 – Tipskonkurrence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;color:#1a2d3d;min-height:100vh}
.wrap{max-width:1200px;margin:0 auto;padding:16px}
.hdr{background:#1A2D3D;color:#fff;padding:16px 20px;border-radius:12px 12px 0 0;display:flex;align-items:center;gap:12px}
.hdr h1{font-size:18px;font-weight:600}
.hdr .sub{font-size:12px;color:#aec6d8;margin-top:2px}
.tabs{display:flex;border-bottom:1px solid #ddd;background:#f8f9fa;padding:0 12px}
.tab{padding:11px 18px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#666;white-space:nowrap;user-select:none}
.tab.active{border-bottom-color:#F0830C;color:#1a2d3d;font-weight:600}
.card{background:#fff;border-radius:0 0 12px 12px;border:1px solid #ddd;border-top:none}
.body{padding:16px}
/* Stilling */
.scard{border:1px solid #ddd;border-radius:10px;overflow:hidden;margin-bottom:14px}
.shdr{background:#1A2D3D;color:#fff;padding:10px 16px;font-size:13px;font-weight:600;display:grid;grid-template-columns:40px 1fr 64px 64px 64px;gap:8px}
.srow{display:grid;grid-template-columns:40px 1fr 64px 64px 64px;gap:8px;padding:10px 16px;border-bottom:1px solid #eee;align-items:center;font-size:13px}
.srow:last-child{border-bottom:none}
.srow.gold{background:#FFFBEA}.srow.silver{background:#F9F9F9}.srow.bronze{background:#FDF5EE}
.pts{text-align:center;font-weight:700;font-size:16px;color:#1a2d3d}
.cnt{text-align:center;font-size:12px;color:#888}
/* Tipsark */
.fbar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.fb{padding:5px 12px;font-size:12px;border:1px solid #ccc;border-radius:20px;cursor:pointer;background:#fff;color:#555}
.fb:hover{background:#f0f0f0}
.fb.active{background:#1A2D3D;color:#fff;border-color:#1A2D3D}
.sync-bar{display:flex;align-items:center;gap:8px;margin-left:auto;font-size:12px;color:#888;white-space:nowrap}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
.sync-dot.ok{background:#2E7D32}
.sync-dot.err{background:#C62828}
.fst{font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:10px;display:none}
.fst.ok{background:#E8F5E9;color:#2E7D32;border:1px solid #A5D6A7;display:block}
.fst.err{background:#FFEBEE;color:#C62828;border:1px solid #EF9A9A;display:block}
.sw{overflow-x:auto;border-radius:10px;border:1px solid #ddd}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1A2D3D;color:#fff;padding:8px 8px;text-align:left;font-weight:600;position:sticky;top:0;z-index:2;white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid #eee;vertical-align:middle}
tr:nth-child(even) td{background:#fafafa}
tr:hover td{background:#f0f4f8}
input.ti{width:46px;padding:3px 4px;font-size:12px;text-align:center;border:1px solid #ccc;border-radius:4px;background:#fff}
input.ti:focus{outline:none;border-color:#F0830C;box-shadow:0 0 0 2px #F0830C33}
input.ri{width:46px;padding:3px 4px;font-size:12px;text-align:center;border:2px solid #2E7D32;border-radius:4px;background:#F1F8F1;font-weight:600;color:#1a2d3d}
input.ri:focus{outline:none;border-color:#1a2d3d}
.hit{background:#C8E6C9!important;color:#1B5E20;font-weight:700}
.miss{color:#bbb}
.sec td{background:#1A2D3D!important;color:#fff;font-weight:600;padding:6px 8px;font-size:11px;letter-spacing:.05em}
.sp{font-size:10px;padding:1px 5px;border-radius:6px;background:#eee;color:#666;white-space:nowrap;margin-top:1px}
/* Setup */
.sbox{background:#fff;border:1px solid #ddd;border-radius:10px;padding:16px;margin-bottom:14px}
.sbox h3{font-size:14px;font-weight:600;margin-bottom:10px;color:#1a2d3d}
.ptag{display:inline-flex;align-items:center;gap:6px;background:#f0f2f5;border:1px solid #ddd;border-radius:20px;padding:4px 10px 4px 8px;margin:3px;font-size:13px}
.ptag button{border:none;background:none;color:#999;cursor:pointer;font-size:16px;line-height:1;padding:0 0 0 2px}
.ptag button:hover{color:#c62828}
.add-row{display:flex;gap:8px;margin-top:10px}
.add-row input{flex:1;padding:8px 12px;border:1px solid #ccc;border-radius:8px;font-size:13px}
.add-row button{padding:8px 16px;background:#F0830C;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
.add-row button:hover{background:#d6730a}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-o{background:#FEF0E0;color:#C05A00}
.badge-g{background:#E8F5E9;color:#2E7D32}
.info-box{background:#E3F2FD;border:1px solid #90CAF9;border-radius:8px;padding:12px;font-size:13px;color:#1565C0;line-height:1.6;margin-bottom:12px}
.danger-btn{margin-top:12px;padding:7px 14px;background:#FFEBEE;color:#C62828;border:1px solid #EF9A9A;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600}
.danger-btn:hover{background:#FFCDD2}
.savebar{position:fixed;bottom:20px;right:20px;background:#2E7D32;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;display:none;z-index:100;box-shadow:0 2px 8px #0003}
.statbar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{background:#f8f9fa;border:1px solid #eee;border-radius:10px;padding:12px;text-align:center}
.stat-lbl{font-size:11px;color:#888;margin-bottom:4px}
.stat-val{font-size:20px;font-weight:700}
.spin{display:inline-block;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.modal-overlay{position:fixed;inset:0;background:#0006;z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:28px;width:320px;box-shadow:0 8px 32px #0003;text-align:center}
.modal h2{font-size:16px;font-weight:600;color:#1a2d3d;margin-bottom:8px}
.modal p{font-size:13px;color:#888;margin-bottom:18px}
.modal select{width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:8px;font-size:14px;margin-bottom:14px;background:#fff;color:#1a2d3d}
.modal button{width:100%;padding:10px;background:#1A2D3D;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.modal button:hover{background:#243d52}
.user-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#EEF2F5;border-bottom:1px solid #ddd;font-size:13px;color:#1a2d3d}
.user-bar strong{color:#F0830C}
.user-bar button{margin-left:auto;padding:4px 12px;background:none;border:1px solid #ccc;border-radius:6px;font-size:12px;cursor:pointer;color:#666}
.user-bar button:hover{background:#fff}
.locked-tip{display:inline-block;width:44px;text-align:center;padding:3px 4px;font-size:12px;border-radius:4px;color:#ccc;background:#f5f5f5}
</style>
</head>

async function load(){
  // Ryd gammel localStorage så den ikke overskriver Supabase-data
  localStorage.removeItem(STORE);
  // Gendan live scores fra lokal cache
  try{const lv=localStorage.getItem('vm2026_live');if(lv)S.live=JSON.parse(lv);}catch(e){}
  try {
    // Hent tips og deltagere fra shared-rækken
    const row = await sb.get('tipskonkurrence', 'shared');
    if (row && row.data) {
      const remote = JSON.parse(row.data);
      S.participants = remote.participants || [];
      S.tips = remote.tips || {};
      S.filter = remote.filter || 'all';
    }
    // Hent resultater fra results-rækken – altid højere prioritet
    const resRow = await sb.get('tipskonkurrence', 'results');
    if (resRow && resRow.data) {
      const resData = JSON.parse(resRow.data);
      S.results = normalizeResults(resData.results);
      S.live = resData.live || {};
    }
  } catch(e) {
    console.warn('Load fejl:', e.message);
  }
  render();
}

async function save(){
  try {
    // Gem lokalt med det samme (hurtig feedback)
    localStorage.setItem(STORE, JSON.stringify(S));
    const b = document.getElementById('savebar'); b.style.display = 'block';
    const n = new Date();
    document.getElementById('sts').textContent = 'Gemt ' + n.getHours() + ':' + String(n.getMinutes()).padStart(2,'0');
    setTimeout(() => b.style.display = 'none', 2000);
    // Gem kun tips og deltagere til Supabase – resultater håndteres af admin/Action
    const shareData = {
      participants: S.participants,
      tips: S.tips,
      filter: S.filter
    };
    await sb.upsert('tipskonkurrence', {
      id: 'shared',
      data: JSON.stringify(shareData),
      updated_at: new Date().toISOString()
    });
  } catch(e) {
    console.warn('Supabase gem fejlede:', e.message);
  }
}

function tip(s1,s2){
  if(s1==null||s2==null)return '';
  return s1>s2?'1':s1===s2?'X':'2';
}

async function fetchLive(manual){
  if(busy)return;busy=true;
  const st=document.getElementById('fst');
  if(st){st.className='fst';st.textContent='';}
  setSyncStatus('loading','Henter resultater…');

  let data=null,lastErr='';
  // Henter data.json fra samme repo – ingen CORS-problemer
  const url='data.json?t='+Date.now();
  try{
    const r=await fetch(url,{cache:'no-cache'});
    if(!r.ok)throw new Error('HTTP '+r.status+' – er data.json uploadet til repo?');
    data=await r.json();
  }catch(e){lastErr=e.message;}

  if(!data||!data.results){
    if(st){st.className='fst err';st.innerHTML='<strong>Kunne ikke hente data.</strong> '+lastErr+'<br><small>Tjek at data.json og GitHub Action er sat op korrekt.</small>';}
    setSyncStatus('err','Sidst forsøgt: '+new Date().toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit'}));
    busy=false;return;
  }

  let updated=0;
  // fetchLive opdaterer KUN S.live (målscorer til visning f.eks. "2–0")
  // S.results (1/X/2) røres ALDRIG her – styres af Supabase alene
  Object.entries(data.results).forEach(([num,val])=>{
    const n=parseInt(num);
    if(!S.live[String(n)]){
      S.live[String(n)]={score:val.score};
      updated++;
    }
  });
  // Gem KUN live scores lokalt – ikke results
  try{localStorage.setItem('vm2026_live',JSON.stringify(S.live));}catch(e){}
  // Brug opdateringstidspunkt fra data.json hvis tilgængeligt
  const dataTs=data.updated?new Date(data.updated).toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Copenhagen'}):'';
  const fetchTs=new Date().toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit'});
  const tsLabel=dataTs?`Data fra kl. ${dataTs} – hentet kl. ${fetchTs}`:`Hentet kl. ${fetchTs}`;
  S.lastSyncMsg=tsLabel;
  S.lastSyncCount=data.count||0;
  renderTips();renderStilling();
  // setSyncStatus EFTER render så elementerne eksisterer i DOM
  setSyncStatus('ok',`✓ ${tsLabel} (${data.count} resultater)`);
  busy=false;
}

function showTab(t){
  ['stilling','tips'].forEach(x=>document.getElementById('t-'+x).style.display=x===t?'block':'none');
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['stilling','tips'][i]===t));
  if(t==='stilling')renderStilling();
  if(t==='tips'){
    renderTips();
  }
}

// Normaliser results fra Supabase - håndterer både {"1":"1"} og {"1":{"tip":"1",...}}
function normalizeResults(raw) {
  const out = {};
  Object.entries(raw||{}).forEach(([k,v]) => {
    out[String(k)] = (v && typeof v === 'object') ? String(v.tip||'') : String(v||'');
  });
  return out;
}

function scores(){
  const sc={};
  S.participants.forEach(p=>{
    let pts=0,correct=0,entered=0;
    M.forEach(m=>{const t=(S.tips[p]||{})[String(m[0])];const r=S.results[String(m[0])];if(t)entered++;if(t&&r&&String(t)===String(r)){pts++;correct++;}});
    sc[p]={pts,correct,entered};
  });
  return sc;
}

function renderStilling(){
  const el=document.getElementById('t-stilling');
  if(!S.participants.length){
    el.innerHTML='<div style="text-align:center;padding:48px;color:#888"><div style="font-size:48px">👥</div><div style="margin-top:10px;font-size:15px">Tilføj deltagere under "Deltagere"</div></div>';return;
  }
  const sc=scores();
  const sorted=[...S.participants].sort((a,b)=>sc[b].pts-sc[a].pts);
  const medals=['🥇','🥈','🥉'];const cls=['gold','silver','bronze'];
  const played=M.filter(m=>S.results[String(m[0])]).length;
  const lc=Object.keys(S.results).length;
  el.innerHTML=`
  <div class="statbar">
    <div class="stat"><div class="stat-lbl">Kampe spillet</div><div class="stat-val">${played}/104</div></div>
    <div class="stat"><div class="stat-lbl">Deltagere</div><div class="stat-val">${S.participants.length}</div></div>
    <div class="stat"><div class="stat-lbl">Leder</div><div class="stat-val" style="font-size:15px;color:#F0830C">${sorted[0]||'–'}</div></div>
  </div>
  ${lc?`<div style="font-size:12px;color:#2E7D32;margin-bottom:12px;padding:8px 12px;background:#E8F5E9;border-radius:8px;border:1px solid #A5D6A7">📡 ${lc} kampresultater indlæst</div>`:''}
  <div class="scard">
    <div class="shdr"><div></div><div>Deltager</div><div style="text-align:center">Point</div><div style="text-align:center">Rigtige</div><div style="text-align:center">Tipset</div></div>
    ${sorted.map((p,i)=>`<div class="srow ${cls[i]||''}"><div style="text-align:center;font-size:18px">${medals[i]||i+1}</div><div style="font-weight:${i<3?700:400}">${p}</div><div class="pts">${sc[p].pts}</div><div class="cnt">${sc[p].correct}</div><div class="cnt">${sc[p].entered}</div></div>`).join('')}
  </div>`;
}

function renderTips(){
  // Debug: vis lock-status for kamp 17
  const dbg = document.getElementById('debug-lock');
  if(dbg){
    const m17 = M.find(m=>m[0]===17);
    if(m17){
      const now = Date.now();
      const lockAt = m17[5]-3600000;
      const diff = Math.round((lockAt-now)/60000);
      dbg.textContent = `K17 lock: ${diff>0?'om '+diff+'min':'LÅST'} (ts=${m17[5]}, now=${now})`;
    }
  }
  const el=document.getElementById('t-tips');
  if(!S.participants.length){el.innerHTML='<div style="text-align:center;padding:48px;color:#888">Tilføj deltagere via Admin-siden for at begynde</div>';return;}
  if(!currentUser){
    // Vis modal direkte i stedet for et mellemled
    showUserModal();
    el.innerHTML='';
    return;
  }
  const filters=[['all','Alle'],['Gruppespil – Runde 1','Runde 1'],['Gruppespil – Runde 2','Runde 2'],['Gruppespil – Runde 3','Runde 3'],['Runde af 32','R32'],['Runde af 16','R16'],['Kvartfinale','QF'],['Semifinale','SF'],['FINALE','Finale']];
  let h=`<div class="fbar">`;
  filters.forEach(([v,l])=>h+=`<button class="fb${S.filter===v?' active':''}" onclick="setFilter('${v}')">${l}</button>`);
  h+=`<div class="sync-bar"><div class="sync-dot" id="sync-dot"></div><span id="sync-txt">Indlæser…</span>
<span id="debug-lock" style="font-size:10px;color:#aaa;margin-left:8px"></span></div></div>`;
  h+=`<div id="fst" class="fst"></div>`;
  h+=`<div class="sw"><table><thead><tr>
    <th style="width:36px">#</th><th style="width:90px">Dato</th>
    <th>Hjemmehold</th><th style="width:18px"></th><th>Udehold</th>
    <th style="text-align:center;width:76px;background:#2E7D32">Resultat</th>`;
  S.participants.forEach(p=>h+=`<th style="text-align:center;width:52px;max-width:52px;overflow:hidden;text-overflow:ellipsis">${p.split(' ')[0]}</th>`);
  h+=`</tr></thead><tbody>`;
  let lastSec='';
  const filtered=S.filter==='all'?M:M.filter(m=>m[4]===S.filter);
  filtered.forEach(m=>{
    if(m[4]!==lastSec){lastSec=m[4];h+=`<tr class="sec"><td colspan="${6+S.participants.length}">${m[4]}</td></tr>`;}
    const res=S.results[String(m[0])]||'';
    const lv=S.live[String(m[0])];
    const matchLocked=m[5]&&Date.now()>=(m[5]-3600000);
    h+=`<tr>
      <td style="text-align:center;font-weight:700;color:#1a2d3d">${m[0]}</td>
      <td style="font-size:11px;color:#888;white-space:nowrap">${m[3]}${matchLocked?' 🔒':''}</td>
      <td>${m[1]}</td><td style="text-align:center;color:#ccc">–</td><td>${m[2]}</td>
      <td style="text-align:center"><div style="display:flex;flex-direction:column;align-items:center;gap:1px">
        ${matchLocked
          ? `<span style="display:inline-block;width:44px;text-align:center;padding:3px 4px;font-size:12px;border-radius:4px;background:${res?'#E8F5E9':'#f0f0f0'};color:${res?'#2E7D32':'#999'};font-weight:${res?700:400}">${res||'–'}</span>`
          : `<input class="ri" data-m="${m[0]}" value="${res}" placeholder="1/X/2" oninput="setRes(this)">`
        }
        ${lv?`<span class="sp">${lv.score}</span>`:''}
      </div></td>`;
    S.participants.forEach(p=>{
      const t=(S.tips[p]||{})[String(m[0])]||'';
      const hit=res&&t&&t===res,miss=res&&t&&t!==res;
      const isMyCol=p===currentUser;
      if(matchLocked){
        // Kamp startet – vis resultat som badge for alle
        h+=`<td style="text-align:center"><span style="display:inline-block;width:44px;padding:3px 4px;font-size:12px;text-align:center;border-radius:4px;background:${hit?'#C8E6C9':miss?'#FFEBEE':'#f0f0f0'};color:${hit?'#1B5E20':miss?'#B71C1C':'#999'};font-weight:${hit||miss?700:400}">${t||'–'}</span></td>`;
      } else if(isMyCol){
        // Min kolonne – kan redigeres
        h+=`<td style="text-align:center;background:#FFFBF0"><input class="ti${hit?' hit':miss?' miss':''}" data-m="${m[0]}" data-p="${encodeURIComponent(p)}" value="${t}" placeholder="?" oninput="setTip(this)"></td>`;
      } else {
        // Andres kolonne – låst
        h+=`<td style="text-align:center"><span class="locked-tip">${t||'?'}</span></td>`;
      }
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  el.innerHTML=h;
}

// ── Bruger-session ──────────────────────────────────────────
let currentUser = sessionStorage.getItem('vm2026_user') || null;

function showUserModal() {
  const modal = document.getElementById('user-modal');
  const sel = document.getElementById('user-select');
  sel.innerHTML = '<option value="">-- Vælg navn --</option>';
  S.participants.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = p;
    if (p === currentUser) opt.selected = true;
    sel.appendChild(opt);
  });
  modal.style.display = 'flex';
}

function confirmUser() {
  const sel = document.getElementById('user-select');
  if (!sel.value) return;
  currentUser = sel.value;
  sessionStorage.setItem('vm2026_user', currentUser);
  document.getElementById('user-modal').style.display = 'none';
  updateUserBar();
  renderTips();
}

function changeUser() {
  currentUser = null;
  sessionStorage.removeItem('vm2026_user');
  updateUserBar();
  showUserModal();
}

function updateUserBar() {
  const bar = document.getElementById('user-bar');
  const name = document.getElementById('user-bar-name');
  if (currentUser) {
    bar.style.display = 'flex';
    name.textContent = currentUser;
  } else {
    bar.style.display = 'none';
  }
}

function setFilter(f){S.filter=f;renderTips();}

function setRes(inp){
  const m=parseInt(inp.dataset.m);const v=inp.value.toUpperCase().replace('U','X');
  S.results[String(m)]=v;inp.value=v;save();
  document.querySelectorAll(`.ti[data-m="${m}"]`).forEach(t=>{
    const tv=t.value.toUpperCase();
    t.className='ti'+(v&&tv&&tv===v?' hit':v&&tv&&tv!==v?' miss':'');
  });
  renderStilling();
}

function setTip(inp){
  const m=parseInt(inp.dataset.m);const p=decodeURIComponent(inp.dataset.p);const v=inp.value.toUpperCase().replace('U','X');
  // Dobbeltsikring: ignorer input hvis kamp er startet
  const match=M.find(x=>x[0]===m);
  if(match&&match[5]&&Date.now()>=(match[5]-3600000)){inp.blur();return;} // 1 time før
  inp.value=v;if(!S.tips[p])S.tips[p]={};S.tips[p][String(m)]=v;
  const res=S.results[String(m)]||'';
  inp.className='ti'+(res&&v&&v===res?' hit':res&&v&&v!==res?' miss':'');
  save();renderStilling();
}

function addP(){
  const i=document.getElementById('nn');const n=i.value.trim();
  if(n&&!S.participants.includes(n)){S.participants.push(n);i.value='';save();renderSetup();renderStilling();}
}

function removeP(p){
  if(!confirm('Fjern '+p+'?'))return;
  S.participants=S.participants.filter(x=>x!==p);delete S.tips[p];save();renderSetup();renderStilling();
}

function resetAll(){
  if(confirm('Slet ALLE tips, resultater og deltagere?\nDette kan ikke fortrydes.'))
  {S={participants:[],tips:{},results:{},live:{},filter:'all'};save();render();}
}

function setSyncStatus(state,txt){
  const dot=document.getElementById('sync-dot');
  const label=document.getElementById('sync-txt');
  if(dot){dot.className='sync-dot'+(state==='ok'?' ok':state==='err'?' err':'');}
  if(label){label.textContent=txt;}
}

function render(){
  renderStilling();
  updateUserBar();
}

// Auto-hent ved load og derefter hvert 10. minut
load();
setTimeout(()=>fetchLive(),800);
setInterval(()=>fetchLive(),10*60*1000);

// Auto-sync fra Supabase hvert 15. sekund
setInterval(async()=>{
  try{
    // Hent begge rækker parallelt
    const [sharedRow, resRow] = await Promise.all([
      sb.get('tipskonkurrence','shared'),
      sb.get('tipskonkurrence','results')
    ]);

    let needRender = false;

    // Opdater tips og deltagere
    if(sharedRow&&sharedRow.data){
      const remote=JSON.parse(sharedRow.data);
      const changed=
        JSON.stringify(remote.participants)!==JSON.stringify(S.participants)||
        JSON.stringify(remote.tips)!==JSON.stringify(S.tips);
      if(changed){
        S.participants=remote.participants||S.participants;
        S.tips=remote.tips||S.tips;
        S.filter=remote.filter||S.filter;
        needRender=true;
      }
    }

    // Opdater resultater
    if(resRow&&resRow.data){
      const resData=JSON.parse(resRow.data);
      const normRes=normalizeResults(resData.results);
      const resChanged=JSON.stringify(normRes)!==JSON.stringify(S.results);
      if(resChanged){
        S.results=normRes;
        S.live=resData.live||{};
        needRender=true;
      }
    }

    // Render kun én gang når begge er hentet
    if(needRender){
      renderStilling();
      if(document.getElementById('t-tips').style.display!=='none')renderTips();
    }
  }catch(e){console.warn('Sync fejl:',e.message);}
},15000);
</script>
